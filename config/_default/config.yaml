baseurl: https://www.aziogas.lt/
title: Ąžiogas
theme: PaperMod
canonifyURLs: true
enableRobotsTXT: true
defaultContentLanguage: lt

Params:
    title: Ąžiogas
    author:
        name: Ąžuolas Krušna
        email: azuolas.krusna@yahoo.com
    description: Mintys ir tekstai apie kalbas, kasdienę filosofiją, programų inžineriją, "pasidaryk pats" techniniai gidai bei gyvenimo Vokietijoje gidai
    opengraph: true
    dateFormat: Mon, Jan 2, 2006
    displayFullLangName: true
    ShowReadingTime: true
    ShowBreadCrumbs: true
    ShowPostNavLinks: true

    label:
        text: Ąžiogas
        icon: /apple-touch-icon.png
        iconHeight: 35

    homeInfoParams:
        Title: Labas, keliautojau. Atsipūsk, paskaityk, pamąstyk
        Content: Mintys ir tekstai apie kalbas, kasdienę filosofiją, programų inžineriją, \"pasidaryk pats\" techniniai gidai bei gyvenimo Vokietijoje gidai

    # socialIcons:
    #     -   name: github
    #         url: https://github.com/AzisK

    editPost:
        URL: "https://github.com/AzisK/myblog/tree/main/content/"
        appendFilePath: true # to append file path to Edit link

    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 0
        keys: ["title", "permalink", "summary", "content"]

Languages:
  lt:
    languageCode: lt
    LanguageDirection: ltr
    languageName: LT
    weight: 1
    permalinks:
      post: /:contentbasename/
    menu:
      main:
        -   identifier: archive
            name: Archyvas
            url: /archive/
            weight: 20
        -   identifier: search
            name: Paieška
            url: /search/
            weight: 20
        -   identifier: tags
            name: Tagai
            pageRef: /tags/
            weight: 30
        -   identifier: about
            name: Apie
            pageRef: /page/about
            weight: 40
        -   identifier: contact
            name: Kontaktai
            pageRef: /page/contact
            weight: 40
  en:
    languageCode: en
    LanguageDirection: ltr
    languageName: EN
    weight: 2
    permalinks:
      post: /:slug
    menu:
      main:
        -   identifier: archive
            name: Archive
            url: /archive/
            weight: 20
        -   identifier: search
            name: Search
            url: /search/
            weight: 20
        -   identifier: tags
            name: Tags
            pageRef: /tags/
            weight: 30
        -   identifier: about
            name: About
            pageRef: /page/about
            weight: 40
        -   identifier: contact
            name: Contact
            pageRef: /page/contact
            weight: 40

outputs:
    home:
        - HTML
        - RSS
        - JSON # is necessary for search
